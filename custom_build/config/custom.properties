# Configuration for a Custom (Single Property) Wallet build.
# See custom_build/README.md for full instructions.

# (Required) Channel name, as it will appear on the Roku home screen.
APP_TITLE="Marquee Sports Network"

# (Required) The Media Property this build is locked to.
# Find it in Creator Studio - it's the ID that starts with "iq__".
# The app will skip the Discover page and launch directly into this Property.
PROPERTY_ID="marquee-sports-network"

# (Required) Channel version (Roku manifest major_version/minor_version/build_version).
MAJOR_VERSION=1
MINOR_VERSION=0
BUILD_VERSION=0

# (Optional) Background color shown behind the splash screen image (manifest splash_color).
SPLASH_COLOR="#000000"
